<html lang="ko">

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --tier1: #f0c040;
    --tier1-bg: rgba(240,192,64,0.08);
    --tier1-border: rgba(240,192,64,0.25);
    --tier2: #60a0e0;
    --tier2-bg: rgba(96,160,224,0.08);
    --tier2-border: rgba(96,160,224,0.25);
    --tier3: #a090c0;
    --tier3-bg: rgba(160,144,192,0.07);
    --tier3-border: rgba(160,144,192,0.2);
    --mkt-target: #50dc78;
    --mkt-exclude: #f08050;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; line-height:1.6; }
  .noise { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:256px; }
  .container { position:relative; z-index:1; max-width:1320px; margin:0 auto; padding:60px 24px 80px; }
  header { text-align:center; margin-bottom:48px; }
  header h1 { font-family:'Playfair Display',serif; font-weight:900; font-size:3rem; letter-spacing:-1px;
    background:linear-gradient(135deg,#f0c040,#e08030,#f0c040); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
  header p { color:var(--text-dim); font-size:0.95rem; font-weight:300; }
  .legend { display:flex; gap:24px; justify-content:center; margin-bottom:40px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:0.84rem; color:var(--text-dim); }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .legend-dot.t1 { background:var(--tier1); box-shadow:0 0 6px var(--tier1); }
  .legend-dot.t2 { background:var(--tier2); box-shadow:0 0 6px var(--tier2); }
  .legend-dot.t3 { background:var(--tier3); box-shadow:0 0 4px var(--tier3); }
  .legend-sep { width:1px; height:16px; background:var(--border); align-self:center; }
  .legend-badge-t { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:500;
    background:rgba(80,220,120,0.08); color:var(--mkt-target); border:1px solid rgba(80,220,120,0.18); }
  .legend-badge-e { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:500;
    background:rgba(240,128,80,0.08); color:var(--mkt-exclude); border:1px solid rgba(240,128,80,0.18); }

  .stats { display:flex; gap:1px; margin-bottom:40px; background:var(--border); border-radius:12px; overflow:hidden; }
  .stat { flex:1; padding:20px; text-align:center; background:var(--surface); }
  .stat:first-child { border-radius:12px 0 0 12px; }
  .stat:last-child { border-radius:0 12px 12px 0; }
  .stat-num { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:600; }
  .stat-label { font-size:0.78rem; color:var(--text-dim); margin-top:2px; }
  .stat.t1 .stat-num { color:var(--tier1); }
  .stat.t2 .stat-num { color:var(--tier2); }
  .stat.t3 .stat-num { color:var(--tier3); }

  .controls { display:flex; gap:12px; margin-bottom:32px; flex-wrap:wrap; align-items:center; }
  .search-box { flex:1; min-width:200px; position:relative; }
  .search-box input { width:100%; padding:12px 16px 12px 42px; background:var(--surface); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .search-box input:focus { border-color:var(--tier1); }
  .search-box input::placeholder { color:var(--text-dim); }
  .search-box svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; stroke:var(--text-dim); }
  .filter-btns { display:flex; gap:6px; flex-wrap:wrap; }
  .fbtn { padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:500; transition:all 0.2s; }
  .fbtn:hover { border-color:var(--text-dim); color:var(--text); }
  .fbtn.active { color:#fff; }
  .fbtn.active[data-f="all"] { background:#333; border-color:#555; }
  .fbtn.active[data-f="1"] { background:rgba(240,192,64,0.2); border-color:var(--tier1); color:var(--tier1); }
  .fbtn.active[data-f="2"] { background:rgba(96,160,224,0.2); border-color:var(--tier2); color:var(--tier2); }
  .fbtn.active[data-f="3"] { background:rgba(160,144,192,0.15); border-color:var(--tier3); color:var(--tier3); }
  .fbtn.active[data-f="mkt"] { background:rgba(80,220,120,0.12); border-color:var(--mkt-target); color:var(--mkt-target); }
  .fbtn.active[data-f="exc"] { background:rgba(240,128,80,0.12); border-color:var(--mkt-exclude); color:var(--mkt-exclude); }

  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:14px 16px; text-align:left; font-weight:500; font-size:0.75rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim);
    background:var(--surface2); border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; transition:color 0.2s; }
  thead th:hover { color:var(--text); }
  thead th .si { display:inline-block; margin-left:4px; opacity:0.4; font-size:0.7rem; }
  thead th.sorted .si { opacity:1; color:var(--tier1); }
  tbody tr { border-bottom:1px solid rgba(255,255,255,0.03); transition:background 0.15s; }
  tbody tr:hover { background:rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom:none; }
  td { padding:11px 16px; font-size:0.88rem; }
  td.code { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--text-dim); letter-spacing:1px; }
  .tier-badge { display:inline-flex; align-items:center; gap:6px; padding:3px 12px; border-radius:20px; font-size:0.78rem; font-weight:600; letter-spacing:0.5px; }
  .tier-badge.t1 { background:var(--tier1-bg); border:1px solid var(--tier1-border); color:var(--tier1); }
  .tier-badge.t2 { background:var(--tier2-bg); border:1px solid var(--tier2-border); color:var(--tier2); }
  .tier-badge.t3 { background:var(--tier3-bg); border:1px solid var(--tier3-border); color:var(--tier3); }
  .tier-badge .dot { width:6px; height:6px; border-radius:50%; }
  .tier-badge.t1 .dot { background:var(--tier1); box-shadow:0 0 6px var(--tier1); }
  .tier-badge.t2 .dot { background:var(--tier2); box-shadow:0 0 6px var(--tier2); }
  .tier-badge.t3 .dot { background:var(--tier3); box-shadow:0 0 4px var(--tier3); }

  .remark-mkt {
    display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:6px;
    font-size:0.75rem; font-weight:500;
    background:rgba(80,220,120,0.08); color:var(--mkt-target); border:1px solid rgba(80,220,120,0.18);
  }
  .remark-exc {
    display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:6px;
    font-size:0.75rem; font-weight:500;
    background:rgba(240,128,80,0.08); color:var(--mkt-exclude); border:1px solid rgba(240,128,80,0.18);
  }
  .remark-none { display:inline-block; padding:3px 10px; font-size:0.75rem; color:var(--text-dim); opacity:0.35; }

  .no-results { text-align:center; padding:60px 20px; color:var(--text-dim); font-size:0.95rem; }

  @media (max-width:700px) {
    header h1 { font-size:2rem; }
    .stats { flex-direction:column; }
    .stat:first-child { border-radius:12px 12px 0 0; }
    .stat:last-child { border-radius:0 0 12px 12px; }
    .controls { flex-direction:column; }
    td, thead th { padding:9px 10px; font-size:0.8rem; }
    .hide-m { display:none; }
    .filter-btns { flex-wrap:wrap; }
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .container>*{animation:fadeUp 0.5s ease both;}
  .container>:nth-child(2){animation-delay:0.05s;}
  .container>:nth-child(3){animation-delay:0.08s;}
  .container>:nth-child(4){animation-delay:0.11s;}
  .container>:nth-child(5){animation-delay:0.14s;}
</style>
</head>

</div>

const seen=new Set();
const data=D.filter(r=>{const k=r[0]+'|'+r[1];if(seen.has(k))return false;seen.add(k);return true;});
function tn(t){return parseInt(t.replace('Tier ',''));}

const tc={1:new Set(),2:new Set(),3:new Set()};
data.forEach(r=>tc[tn(r[3])].add(r[0]));
document.getElementById('c1').textContent=tc[1].size;
document.getElementById('c2').textContent=tc[2].size;
document.getElementById('c3').textContent=tc[3].size;
document.getElementById('total').textContent=new Set([...tc[1],...tc[2],...tc[3]]).size;

let cf='all',cs={col:'tier',asc:true},sq='';

function render(){
  let f=data.filter(r=>{
    const t=tn(r[3]),rm=r[4];
    if(cf==='1'&&t!==1)return false;
    if(cf==='2'&&t!==2)return false;
    if(cf==='3'&&t!==3)return false;
    if(cf==='mkt'&&rm!=='t')return false;
    if(cf==='exc'&&rm!=='e')return false;
    if(sq){const s=sq.toLowerCase();return r[0].toLowerCase().includes(s)||r[1].toLowerCase().includes(s)||r[2].includes(sq);}
    return true;
  });
  f.sort((a,b)=>{
    let va,vb;
    switch(cs.col){
      case'code':va=a[0];vb=b[0];break;
      case'en':va=a[1];vb=b[1];break;
      case'kr':va=a[2];vb=b[2];break;
      case'tier':va=tn(a[3]);vb=tn(b[3]);break;
      case'remark':
        const ro={t:0,e:1,'':2};
        va=ro[a[4]]??2;vb=ro[b[4]]??2;break;
    }
    if(cs.col==='tier'||cs.col==='remark'){const d=cs.asc?va-vb:vb-va;return d!==0?d:a[1].localeCompare(b[1]);}
    const c=String(va).localeCompare(String(vb));return cs.asc?c:-c;
  });
  const tb=document.getElementById('tb'),nr=document.getElementById('nr');
  if(!f.length){tb.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  tb.innerHTML=f.map(r=>{
    const t=tn(r[3]),tcl='t'+t,rm=r[4];
    let rmHtml;
    if(rm==='t') rmHtml='<span class="remark-mkt">◎ 마케팅 주요 타겟</span>';
    else if(rm==='e') rmHtml='<span class="remark-exc">✕ 마케팅 제외 타겟</span>';
    else rmHtml='<span class="remark-none">—</span>';
    return`<tr><td class="code">${r[0]}</td><td class="hide-m">${r[1]}</td><td>${r[2]}</td><td><span class="tier-badge ${tcl}"><span class="dot"></span>Tier ${t}</span></td><td>${rmHtml}</td></tr>`;
  }).join('');
}
document.querySelectorAll('.fbtn').forEach(b=>{b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');cf=b.dataset.f;render();});});
document.getElementById('q').addEventListener('input',e=>{sq=e.target.value.trim();render();});
document.querySelectorAll('thead th').forEach(th=>{th.addEventListener('click',()=>{
  const c=th.dataset.c;if(cs.col===c)cs.asc=!cs.asc;else cs={col:c,asc:true};
  document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('sorted');t.querySelector('.si').textContent='▲';});
  th.classList.add('sorted');th.querySelector('.si').textContent=cs.asc?'▲':'▼';render();});});
render();
