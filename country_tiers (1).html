<title>국가 티어 분류표</title>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --tier1: #f0c040;
    --tier1-bg: rgba(240,192,64,0.08);
    --tier1-border: rgba(240,192,64,0.25);
    --tier2: #60a0e0;
    --tier2-bg: rgba(96,160,224,0.08);
    --tier2-border: rgba(96,160,224,0.25);
    --tier3: #707088;
    --tier3-bg: rgba(112,112,136,0.05);
    --tier3-border: rgba(112,112,136,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 60px 24px 80px;
  }

  header {
    text-align: center; margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 3rem; letter-spacing: -1px;
    background: linear-gradient(135deg, #f0c040, #e08030, #f0c040);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  header p {
    color: var(--text-dim); font-size: 0.95rem; font-weight: 300;
  }

  /* Stats bar */
  .stats {
    display: flex; gap: 1px; margin-bottom: 40px;
    background: var(--border); border-radius: 12px; overflow: hidden;
  }
  .stat {
    flex: 1; padding: 20px; text-align: center; background: var(--surface);
  }
  .stat:first-child { border-radius: 12px 0 0 12px; }
  .stat:last-child { border-radius: 0 12px 12px 0; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 600; }
  .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
  .stat.t1 .stat-num { color: var(--tier1); }
  .stat.t2 .stat-num { color: var(--tier2); }
  .stat.t3 .stat-num { color: var(--tier3); }

  /* Controls */
  .controls {
    display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 200px; position: relative;
  }
  .search-box input {
    width: 100%; padding: 12px 16px 12px 42px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--tier1); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; stroke: var(--text-dim);
  }

  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: 500;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { color: #fff; }
  .filter-btn.active[data-tier="all"] { background: #333; border-color: #555; }
  .filter-btn.active[data-tier="1"] { background: rgba(240,192,64,0.2); border-color: var(--tier1); color: var(--tier1); }
  .filter-btn.active[data-tier="2"] { background: rgba(96,160,224,0.2); border-color: var(--tier2); color: var(--tier2); }
  .filter-btn.active[data-tier="3"] { background: rgba(112,112,136,0.15); border-color: var(--tier3); color: #bbb; }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 14px 20px; text-align: left; font-weight: 500; font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim);
    background: var(--surface2); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
    transition: color 0.2s;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 0.7rem; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--tier1); }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 12px 20px; font-size: 0.9rem;
  }

  td.code {
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    color: var(--text-dim); letter-spacing: 1px;
  }

  .tier-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.5px;
  }
  .tier-badge.t1 { background: var(--tier1-bg); border: 1px solid var(--tier1-border); color: var(--tier1); }
  .tier-badge.t2 { background: var(--tier2-bg); border: 1px solid var(--tier2-border); color: var(--tier2); }
  .tier-badge.t3 { background: var(--tier3-bg); border: 1px solid var(--tier3-border); color: var(--tier3); }
  .tier-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .tier-badge.t1 .dot { background: var(--tier1); box-shadow: 0 0 6px var(--tier1); }
  .tier-badge.t2 .dot { background: var(--tier2); box-shadow: 0 0 6px var(--tier2); }
  .tier-badge.t3 .dot { background: var(--tier3); }

  .count-badge {
    display: inline-block; margin-left: 12px; font-size: 0.75rem;
    color: var(--text-dim); font-weight: 400;
  }

  .no-results {
    text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 0.95rem;
  }

  /* Responsive */
  @media (max-width: 640px) {
    header h1 { font-size: 2rem; }
    .stats { flex-direction: column; }
    .stat:first-child { border-radius: 12px 12px 0 0; }
    .stat:last-child { border-radius: 0 0 12px 12px; }
    .controls { flex-direction: column; }
    td, thead th { padding: 10px 12px; font-size: 0.82rem; }
    .hide-mobile { display: none; }
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Changed highlight */
  tbody tr.changed {
    background: rgba(80, 220, 120, 0.08);
  }
  tbody tr.changed:hover {
    background: rgba(80, 220, 120, 0.12);
  }
  .changed-badge {
    display: inline-block; margin-left: 8px;
    padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600;
    background: rgba(80, 220, 120, 0.15); color: #50dc78; border: 1px solid rgba(80, 220, 120, 0.3);
    letter-spacing: 0.5px; vertical-align: middle;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(80, 220, 120, 0); }
    50% { box-shadow: 0 0 8px 2px rgba(80, 220, 120, 0.15); }
  }
  tbody tr.changed td:first-child { border-left: 3px solid #50dc78; }

  .container > * {
    animation: fadeUp 0.5s ease both;
  }
  .container > :nth-child(2) { animation-delay: 0.05s; }
  .container > :nth-child(3) { animation-delay: 0.1s; }
  .container > :nth-child(4) { animation-delay: 0.15s; }
</style>
</head>

      <button class="filter-btn" data-tier="2">Tier 2</button>
      <button class="filter-btn" data-tier="3">Tier 3</button>

  <div class="table-wrap">

      <tbody id="tableBody"></tbody>
    </table>
    <div class="no-results" id="noResults" style="display:none;">검색 결과가 없습니다.</div>
  </div>
</div>

// Deduplicate by code+english name
const seen = new Set();
const data = rawData.filter(r => {
  const key = r[0] + '|' + r[1];
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

function tierNum(t) { return parseInt(t.replace('Tier ', '')); }

// Count unique country codes per tier
const tierCodes = { 1: new Set(), 2: new Set(), 3: new Set() };
data.forEach(r => tierCodes[tierNum(r[3])].add(r[0]));
document.getElementById('t1Count').textContent = tierCodes[1].size;
document.getElementById('t2Count').textContent = tierCodes[2].size;
document.getElementById('t3Count').textContent = tierCodes[3].size;
const allCodes = new Set([...tierCodes[1], ...tierCodes[2], ...tierCodes[3]]);
document.getElementById('totalCountries').textContent = allCodes.size;

let currentFilter = 'all';
let currentSort = { col: 'tier', asc: true };
let searchTerm = '';

function renderTable() {
  let filtered = data.filter(r => {
    if (currentFilter !== 'all' && tierNum(r[3]) !== parseInt(currentFilter)) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return r[0].toLowerCase().includes(s) || r[1].toLowerCase().includes(s) || r[2].includes(searchTerm);
    }
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    switch (currentSort.col) {
      case 'code': va = a[0]; vb = b[0]; break;
      case 'en': va = a[1]; vb = b[1]; break;
      case 'kr': va = a[2]; vb = b[2]; break;
      case 'tier': va = tierNum(a[3]); vb = tierNum(b[3]); break;
    }
    if (currentSort.col === 'tier') {
      const diff = currentSort.asc ? va - vb : vb - va;
      return diff !== 0 ? diff : a[1].localeCompare(b[1]);
    }
    const cmp = String(va).localeCompare(String(vb));
    return currentSort.asc ? cmp : -cmp;
  });

  const tbody = document.getElementById('tableBody');
  const noResults = document.getElementById('noResults');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const tn = tierNum(r[3]);
    const tc = 't' + tn;
    const isChanged = r[4] === 'changed';
    const changedBadge = isChanged ? '<span class="changed-badge">T2→T1</span>' : '';
    return `<tr class="${isChanged ? 'changed' : ''}">
      <td class="code">${r[0]}</td>
      <td class="hide-mobile">${r[1]}</td>
      <td>${r[2]}</td>
      <td><span class="tier-badge ${tc}"><span class="dot"></span>Tier ${tn}</span>${changedBadge}</td>
    </tr>`;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.tier;
    renderTable();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderTable();
});

// Sort
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (currentSort.col === col) {
      currentSort.asc = !currentSort.asc;
    } else {
      currentSort = { col, asc: true };
    }
    document.querySelectorAll('thead th').forEach(t => {
      t.classList.remove('sorted');
      t.querySelector('.sort-icon').textContent = '▲';
    });
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = currentSort.asc ? '▲' : '▼';
    renderTable();
  });
});

renderTable();
</script>
